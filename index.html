<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insel-Wiki — Kollaboratives Wiki</title>
  <meta name="description" content="Insel-Wiki: Kollaboratives Echtzeit-Wiki für das Inselspital Bern. Gemeinsam Wissen teilen und bearbeiten." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <!-- Auth Overlay (for non-logged-in users) -->
  <div id="auth-overlay" class="auth-overlay hidden">
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 48 48" width="48" height="48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#grad)" />
          <path d="M14 34V14h4v20h-4zm8-10h4v10h-4V24zm8-6h4v16h-4V18z" fill="#fff" opacity="0.9"/>
          <defs><linearGradient id="grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
        <h1>Insel-Wiki</h1>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <h2>Anmelden</h2>
        <div class="form-group">
          <label for="login-email">E-Mail (@insel.ch)</label>
          <input type="email" id="login-email" placeholder="vorname.name@insel.ch" required />
        </div>
        <div class="form-group">
          <label for="login-password">Passwort</label>
          <input type="password" id="login-password" placeholder="Ihr Passwort" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Anmelden</button>
        <div class="auth-error hidden" id="login-error"></div>
        <div class="auth-divider"><span>oder</span></div>
        <a id="request-access-link" class="btn btn-outline" href="#">
          ✉️ Zugang anfordern
        </a>
        <p class="auth-hint">Senden Sie eine E-Mail von Ihrer @insel.ch Adresse mit Ihrem gewünschten Passwort.</p>
      </form>
    </div>
  </div>

  <!-- Main App Layout -->
  <div id="app" class="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg viewBox="0 0 32 32" width="24" height="24" fill="none">
            <rect width="32" height="32" rx="8" fill="url(#grad2)" />
            <path d="M9 23V9h3v14H9zm5-7h3v7h-3v-7zm5-4h3v11h-3V12z" fill="#fff" opacity="0.9"/>
            <defs><linearGradient id="grad2" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
          </svg>
          <span class="sidebar-title">Insel-Wiki</span>
        </div>
        <button id="new-page-btn" class="btn-icon" title="Neue Seite">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="Suchen…" />
      </div>
      <nav id="page-tree" class="page-tree"></nav>
      <div class="sidebar-footer">
        <div id="user-info" class="user-info"></div>
        <button id="logout-btn" class="btn-icon btn-small" title="Abmelden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header / Toolbar -->
      <header id="toolbar" class="toolbar">
        <button id="sidebar-toggle" class="btn-icon mobile-only" title="Menü">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="breadcrumb" class="breadcrumb"></div>
        <div class="toolbar-actions">
          <div id="collab-cursors" class="collab-cursors"></div>
          <button id="history-btn" class="btn-icon" title="Verlauf">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
          <button id="add-child-btn" class="btn-icon" title="Unterseite erstellen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
          <button id="delete-page-btn" class="btn-icon btn-danger" title="Seite löschen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </div>
      </header>

      <!-- Editor area -->
      <div id="editor-container" class="editor-container">
        <div id="title-input-wrapper" class="title-input-wrapper">
          <input type="text" id="page-title" class="page-title-input" placeholder="Seitentitel…" />
          <span id="save-status" class="save-status">Gespeichert</span>
        </div>
        <div id="editor" class="editor"></div>
      </div>

      <!-- History Panel (slide-in) -->
      <div id="history-panel" class="history-panel hidden">
        <div class="history-header">
          <h3>Verlauf</h3>
          <button id="close-history" class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="history-list" class="history-list"></div>
        <div id="history-preview" class="history-preview"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <h2>Willkommen im Insel-Wiki</h2>
        <p>Erstelle eine neue Seite um loszulegen.</p>
        <button id="empty-new-page" class="btn btn-primary">+ Neue Seite</button>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
